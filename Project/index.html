<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style src="site.css"/>
    <title>Number Guessing Game</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --dark-color: #011627;
            --light-color: #f6f7f8;
        }
    
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-color);
            color: var(--dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
    
        h1 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }
    
        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
    
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin: 5px;
        }
    
        .btn:hover {
            opacity: 0.9;
        }
    
        .btn-danger {
            background-color: var(--danger-color);
        }
    
        .game-controls {
            margin-top: 20px;
        }
    
        .input-section {
            margin: 20px 0;
        }
    
        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
    
        input[type="number"]:focus {
            border-color: var(--primary-color);
        }
    
        .hidden {
            display: none !important;
        }
    
        #message {
            font-weight: bold;
            margin-top: 15px;
            min-height: 24px;
        }
    
        .status-win {
            color: var(--success-color);
        }
    
        .status-lose {
            color: var(--danger-color);
        }
    
        .status-info {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Guess The Number!</h1>
        <p>I'm thinking of a number between <b>1 and 25</b>. You have <b>3 attempts</b>.</p>

        <div id="start-section">
            <button class="btn" id="start-btn">Start Game</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="input-section">
                <input type="number" id="guess-input" min="1" max="25" placeholder="??">
                <button class="btn" id="guess-btn">Guess</button>
            </div>
            
            <p id="attempts-left">Attempts left: 3</p>
            <button class="btn btn-danger" id="end-btn">End Game</button>
        </div>

        <div id="restart-section" class="hidden">
            <button class="btn" id="play-again-btn">Play Again?</button>
        </div>

        <p id="message"></p>
    </div>

    <script>
        // Game State Variables
        let targetNumber;
        let attemptsLeft;
        const maxAttempts = 3;

        // DOM Elements
        const startSection = document.getElementById('start-section');
        const gameSection = document.getElementById('game-section');
        const restartSection = document.getElementById('restart-section');
        
        const startBtn = document.getElementById('start-btn');
        const endBtn = document.getElementById('end-btn');
        const guessBtn = document.getElementById('guess-btn');
        const playAgainBtn = document.getElementById('play-again-btn');
        
        const guessInput = document.getElementById('guess-input');
        const attemptsText = document.getElementById('attempts-left');
        const messageText = document.getElementById('message');

        // Event Listeners
        startBtn.addEventListener('click', startGame);
        endBtn.addEventListener('click', endGame);
        playAgainBtn.addEventListener('click', startGame);
        guessBtn.addEventListener('click', handleGuess);
        
        // Allow user to press 'Enter' key to submit guess
        guessInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleGuess();
            }
        });

        // Initialize/Start Game Function
        function startGame() {
            targetNumber = Math.floor(Math.random() * 25) + 1;
            attemptsLeft = maxAttempts;
            
            // Reset UI
            guessInput.value = '';
            attemptsText.textContent = `Attempts left: ${attemptsLeft}`;
            setMessage('', '');
            
            // Toggle Visibility
            startSection.classList.add('hidden');
            restartSection.classList.add('hidden');
            gameSection.classList.remove('hidden');
            
            guessInput.focus();
        }

        // Handle the user's guess submission
        function handleGuess() {
            const userGuess = parseInt(guessInput.value);

            // Validation check
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 25) {
                setMessage('Please enter a valid number between 1 and 25.', 'status-info');
                return;
            }

            attemptsLeft--;

            if (userGuess === targetNumber) {
                setMessage(`🎉 Congratulations! You guessed the right number (${targetNumber})!`, 'status-win');
                showGameOverOptions();
            } else if (attemptsLeft === 0) {
                setMessage(`😢 Game Over! You lost. The correct number was ${targetNumber}.`, 'status-lose');
                showGameOverOptions();
            } else {
                // Give a small hint to make it fun
                const hint = userGuess > targetNumber ? 'Too high!' : 'Too low!';
                setMessage(`${hint} Try again.`, 'status-info');
                attemptsText.textContent = `Attempts left: ${attemptsLeft}`;
                guessInput.value = '';
                guessInput.focus();
            }
        }

        // Show options after winning or losing
        function showGameOverOptions() {
            gameSection.classList.add('hidden');
            restartSection.classList.remove('hidden');
        }

        // End Game Manual Function
        function endGame() {
            setMessage('Game ended. Thanks for visiting!', 'status-info');
            gameSection.classList.add('hidden');
            restartSection.classList.add('hidden');
            startSection.classList.remove('hidden');
        }

        // Helper function to update messages smoothly
        function setMessage(text, className) {
            messageText.textContent = text;
            messageText.className = className;
        }
    </script>
</body>
</html>
